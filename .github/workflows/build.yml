name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 python3 python3-pip ffmpeg zip
          pip3 install Pillow

      - name: Fetch audio + music
        run: |
          python3 tools/fetch_audio.py
          python3 tools/gen_audio.py --music-all

      - name: Cross-compile
        run: |
          cmake -B build-win -DCMAKE_TOOLCHAIN_FILE=cmake/windows.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build-win -j$(nproc)

      - name: Package
        run: ./tools/package_windows.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DungeonEngine-Windows
          path: DungeonEngine-Windows.zip

  build-linux:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3 python3-pip ffmpeg zip \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev \
            libgl-dev libasound2-dev libpulse-dev libudev-dev
          pip3 install Pillow || pip3 install Pillow --break-system-packages

      - name: Fetch audio + music
        run: |
          python3 tools/fetch_audio.py
          python3 tools/gen_audio.py --music-all

      - name: Build
        run: |
          cmake -B build-rel -DCMAKE_BUILD_TYPE=Release
          cmake --build build-rel -j$(nproc)

      - name: Package
        run: |
          SUFFIX=$(echo "${{ matrix.os }}" | sed 's/ubuntu-//')
          mkdir -p package-linux
          cp build-rel/src/DungeonEngine package-linux/
          chmod +x package-linux/DungeonEngine
          cp -r assets package-linux/assets
          rm -f package-linux/assets/audio/.fetched
          cat > package-linux/run.sh << 'SH'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./DungeonEngine "$@"
          SH
          chmod +x package-linux/run.sh
          cd package-linux && zip -r ../DungeonEngine-Linux-${SUFFIX}.zip . && cd ..

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DungeonEngine-Linux-${{ matrix.os }}
          path: DungeonEngine-Linux-*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake python3 ffmpeg zip

      - name: Install Pillow
        run: pip3 install Pillow --break-system-packages

      - name: Fetch audio + music
        run: |
          python3 tools/fetch_audio.py
          python3 tools/gen_audio.py --music-all

      - name: Build
        run: |
          cmake -B build-rel -DCMAKE_BUILD_TYPE=Release
          cmake --build build-rel -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p DungeonEngine.app/Contents/MacOS
          mkdir -p DungeonEngine.app/Contents/Resources
          cp build-rel/src/DungeonEngine DungeonEngine.app/Contents/MacOS/
          cp -r assets DungeonEngine.app/Contents/Resources/assets
          rm -f DungeonEngine.app/Contents/Resources/assets/audio/.fetched
          cat > DungeonEngine.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>DungeonEngine</string>
            <key>CFBundleIdentifier</key><string>com.edrethardo.dungeonengine</string>
            <key>CFBundleName</key><string>Dungeon Engine</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST
          zip -r DungeonEngine-macOS.zip DungeonEngine.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DungeonEngine-macOS
          path: DungeonEngine-macOS.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DungeonEngine-Windows/DungeonEngine-Windows.zip
            DungeonEngine-Linux-ubuntu-22.04/DungeonEngine-Linux-22.04.zip
            DungeonEngine-Linux-ubuntu-24.04/DungeonEngine-Linux-24.04.zip
            DungeonEngine-macOS/DungeonEngine-macOS.zip
          generate_release_notes: true
